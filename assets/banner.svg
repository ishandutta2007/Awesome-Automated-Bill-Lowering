<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0c29"/>
      <stop offset="50%" style="stop-color:#302b63"/>
      <stop offset="100%" style="stop-color:#24243e"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="50%" style="stop-color:#7b2ff7"/>
      <stop offset="100%" style="stop-color:#ff6fd8"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)" rx="12"/>

  <!-- Animated grid pattern -->
  <g opacity="0.06">
    <line x1="0" y1="50" x2="1200" y2="50" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="250" x2="1200" y2="250" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="0" x2="100" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="500" y1="0" x2="500" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="700" y1="0" x2="700" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="1100" y1="0" x2="1100" y2="300" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Floating animated circles -->
  <circle cx="100" cy="80" r="4" fill="#00d2ff" opacity="0.5" filter="url(#softGlow)">
    <animate attributeName="cy" values="80;60;80" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="220" r="3" fill="#7b2ff7" opacity="0.4" filter="url(#softGlow)">
    <animate attributeName="cy" values="220;240;220" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="950" cy="60" r="5" fill="#ff6fd8" opacity="0.4" filter="url(#softGlow)">
    <animate attributeName="cy" values="60;40;60" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1100" cy="200" r="3.5" fill="#ffd200" opacity="0.3" filter="url(#softGlow)">
    <animate attributeName="cy" values="200;180;200" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="500" cy="250" r="2.5" fill="#00d2ff" opacity="0.3" filter="url(#softGlow)">
    <animate attributeName="cy" values="250;230;250" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="750" cy="40" r="3" fill="#f7971e" opacity="0.35" filter="url(#softGlow)">
    <animate attributeName="cy" values="40;55;40" dur="5.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Dollar sign icon -->
  <g transform="translate(80, 100)" filter="url(#glow)">
    <circle cx="30" cy="30" r="35" fill="none" stroke="url(#accentGrad)" stroke-width="2.5" opacity="0.7">
      <animate attributeName="r" values="35;38;35" dur="3s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="45" text-anchor="middle" fill="url(#accentGrad)" font-family="'Segoe UI', Arial, sans-serif" font-size="40" font-weight="bold">$</text>
  </g>

  <!-- Down arrow icon (bill lowering) -->
  <g transform="translate(1050, 95)" filter="url(#glow)" opacity="0.8">
    <polyline points="0,0 20,25 40,0" fill="none" stroke="#00d2ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </polyline>
    <polyline points="0,20 20,45 40,20" fill="none" stroke="#7b2ff7" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </polyline>
    <polyline points="0,40 20,65 40,40" fill="none" stroke="#ff6fd8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.2;0.7;0.2" dur="2s" repeatCount="indefinite" begin="0.6s"/>
    </polyline>
  </g>

  <!-- Main title -->
  <text x="600" y="120" text-anchor="middle" fill="url(#textGrad)" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="bold" letter-spacing="2" filter="url(#glow)">
    Awesome Automated
  </text>
  <text x="600" y="175" text-anchor="middle" fill="url(#textGrad)" font-family="'Segoe UI', Arial, sans-serif" font-size="48" font-weight="bold" letter-spacing="2" filter="url(#glow)">
    Bill Lowering
  </text>

  <!-- Subtitle -->
  <text x="600" y="215" text-anchor="middle" fill="#aaa" font-family="'Segoe UI', Arial, sans-serif" font-size="16" letter-spacing="4" opacity="0.9">
    AI NEGOTIATION • SUBSCRIPTION MANAGEMENT • COST OPTIMIZATION
  </text>

  <!-- Animated underline -->
  <rect x="250" y="232" width="700" height="2" rx="1" fill="url(#textGrad)" opacity="0.5">
    <animate attributeName="width" values="0;700" dur="2s" fill="freeze"/>
    <animate attributeName="x" values="600;250" dur="2s" fill="freeze"/>
  </rect>

  <!-- Tagline -->
  <text x="600" y="265" text-anchor="middle" fill="#888" font-family="'Segoe UI', Arial, sans-serif" font-size="13" letter-spacing="1.5">
    Curated SaaS Products &amp; Open-Source Projects for Smarter Bill Management
  </text>

  <!-- Pulsing dot accents -->
  <circle cx="235" cy="232" r="3" fill="#00d2ff" opacity="0.8">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="965" cy="232" r="3" fill="#ff6fd8" opacity="0.8">
    <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
